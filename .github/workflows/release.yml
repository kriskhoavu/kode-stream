name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  signing-config:
    runs-on: ubuntu-latest
    outputs:
      macos_enabled: ${{ steps.detect.outputs.macos_enabled }}
      windows_enabled: ${{ steps.detect.outputs.windows_enabled }}
    steps:
      - name: Detect signing configuration
        id: detect
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_P12_PASSWORD: ${{ secrets.MACOS_CERT_P12_PASSWORD }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          WINDOWS_CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          if [[ -n "$MACOS_CERT_P12_BASE64" && -n "$MACOS_CERT_P12_PASSWORD" && -n "$MACOS_CODESIGN_IDENTITY" ]]; then
            echo "macos_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "macos_enabled=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ -n "$WINDOWS_CERT_PFX_BASE64" && -n "$WINDOWS_CERT_PASSWORD" ]]; then
            echo "windows_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "windows_enabled=false" >> "$GITHUB_OUTPUT"
          fi

  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: npm ci

      - name: Frontend typecheck and test
        run: npm run typecheck && npm test -- --run

      - name: Build frontend assets
        run: npm run build

      - name: Backend test
        run: go test ./...

  build:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            ext: tar.gz
          - goos: darwin
            goarch: amd64
            ext: tar.gz
          - goos: linux
            goarch: amd64
            ext: tar.gz
          - goos: windows
            goarch: amd64
            ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          BIN_NAME="kode-stream"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BIN_NAME="kode-stream.exe"
          fi
          go build -trimpath -ldflags "-s -w" -o "dist/${BIN_NAME}" ./cmd/kode-stream

      - name: Package artifact
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARTIFACT_BASE="kode-stream_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p package
          cp README.md package/
          cp LICENSE* package/ 2>/dev/null || true
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cp dist/kode-stream.exe package/
            (cd package && zip -r "../${ARTIFACT_BASE}.zip" .)
          else
            cp dist/kode-stream package/
            tar -C package -czf "${ARTIFACT_BASE}.tar.gz" .
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            kode-stream_*_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
            kode-stream_*_${{ matrix.goos }}_${{ matrix.goarch }}.zip

  checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten release assets
        run: |
          mkdir -p out
          find release-assets -type f -name "kode-stream_*" -exec cp {} out/ \;

      - name: Generate SHA256SUMS
        run: |
          cd out
          sha256sum kode-stream_* > SHA256SUMS

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: release-checksums
          path: out/SHA256SUMS

  sign-macos:
    needs: [ build, signing-config ]
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v') && needs.signing-config.outputs.macos_enabled == 'true'
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-darwin-*
          path: macos-artifacts
          merge-multiple: true

      - name: Import signing certificate
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_P12_PASSWORD: ${{ secrets.MACOS_CERT_P12_PASSWORD }}
        run: |
          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > signing-cert.p12
          security create-keychain -p "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "" build.keychain
          security import signing-cert.p12 -k build.keychain -P "$MACOS_CERT_P12_PASSWORD" -T /usr/bin/codesign
          security list-keychains -s build.keychain login.keychain

      - name: Sign macOS binaries
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: |
          mkdir -p signed
          for archive in macos-artifacts/kode-stream_*_darwin_*.tar.gz; do
            base="$(basename "$archive" .tar.gz)"
            workdir="$(mktemp -d)"
            tar -xzf "$archive" -C "$workdir"
            codesign --force --options runtime --timestamp --sign "$MACOS_CODESIGN_IDENTITY" "$workdir/kode-stream"
            tar -C "$workdir" -czf "signed/${base}-signed.tar.gz" .
          done

      - name: Upload signed macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-darwin-signed
          path: signed/kode-stream_*_darwin_*-signed.tar.gz

  sign-windows:
    needs: [ build, signing-config ]
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v') && needs.signing-config.outputs.windows_enabled == 'true'
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-windows-*
          path: windows-artifacts
          merge-multiple: true

      - name: Import certificate and sign binaries
        shell: pwsh
        env:
          WINDOWS_CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          $certPath = Join-Path $PWD "codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERT_PFX_BASE64))
          $signtool = (Get-Command signtool.exe -ErrorAction Stop).Source
          New-Item -Path signed -ItemType Directory -Force | Out-Null
          Get-ChildItem -Path windows-artifacts -Filter "kode-stream_*_windows_amd64.zip" | ForEach-Object {
            $base = $_.BaseName
            $work = Join-Path $PWD ("work-" + $base)
            Expand-Archive -Path $_.FullName -DestinationPath $work -Force
            & $signtool sign /fd SHA256 /f $certPath /p $env:WINDOWS_CERT_PASSWORD /tr "http://timestamp.digicert.com" /td SHA256 (Join-Path $work "kode-stream.exe")
            Compress-Archive -Path (Join-Path $work "*") -DestinationPath (Join-Path $PWD "signed\$base-signed.zip") -Force
          }

      - name: Upload signed Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-signed
          path: signed/kode-stream_*_windows_amd64-signed.zip

  publish:
    needs: checksums
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Download signed macOS artifacts (optional)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: release-darwin-signed
          path: release-assets/signed

      - name: Download signed Windows artifacts (optional)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: release-windows-signed
          path: release-assets/signed

      - name: Collect release files
        run: |
          mkdir -p release
          find release-assets -type f -name "kode-stream_*" -exec cp {} release/ \;
          find release-assets -type f -name "SHA256SUMS" -exec cp {} release/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/kode-stream_*.tar.gz
            release/kode-stream_*.zip
            release/kode-stream_*-signed.tar.gz
            release/kode-stream_*-signed.zip
            release/SHA256SUMS
